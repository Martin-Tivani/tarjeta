<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martin Tivani — Gerente de Compras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a1628;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem;
  }

  .card {
    background: #0f2240;
    border-radius: 20px;
    padding: 2rem 2.5rem 1.75rem;
    width: 100%;
    max-width: 680px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  .circle-top {
    position: absolute;
    top: -80px;
    right: -80px;
    width: 220px;
    height: 220px;
    background: #1a3a6b;
    border-radius: 50%;
  }

  .circle-bottom {
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 160px;
    height: 160px;
    background: #1a3a6b;
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 2.5rem;
  }

  .col-left {
    flex: 1;
    min-width: 0;
  }

  .col-right {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 1.25rem;
  }

  .avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #c8a84b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 20px;
    color: #0f2240;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }

  .name {
    font-size: 26px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .title {
    font-size: 13px;
    color: #c8a84b;
    margin-top: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: #c8a84b;
    margin-bottom: 1.5rem;
    border-radius: 2px;
  }

  .company {
    font-size: 15px;
    color: #7fa8cc;
    margin-bottom: 0;
    letter-spacing: 0.03em;
  }

  .email-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 1rem;
  }

  .email-icon {
    flex-shrink: 0;
    color: #c8a84b;
    width: 18px;
    height: 18px;
  }

  .email-text {
    font-size: 12.5px;
    color: #cce0f5;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .copy-btn {
    background: #c8a84b;
    border: none;
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #0f2240;
    cursor: pointer;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .copy-btn:hover { background: #d9ba60; }
  .copy-btn:active { transform: scale(0.96); }
  .copy-btn.copied { background: #4caf81; color: #fff; }

  .footer {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .industry-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c8a84b;
    flex-shrink: 0;
  }

  .industry-text {
    font-size: 12px;
    color: #4d6a87;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="circle-top"></div>
  <div class="circle-bottom"></div>

  <div class="content">
    <div class="col-left">
      <div class="header">
        <div class="avatar">MT</div>
        <div>
          <div class="name">Martin Tivani</div>
          <div class="title">Gerente de Compras</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="company">San Francisco Hogar SRL</div>
    </div>

    <div style="width: 0.5px; background: rgba(255,255,255,0.08); align-self: stretch; flex-shrink: 0;"></div>

    <div class="col-right">
      <div class="email-row">
        <svg class="email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        <span class="email-text">compras3.sanfranciscohogar@gmail.com</span>
        <button class="copy-btn" id="copyBtn" onclick="copyEmail()">Copiar</button>
      </div>

      <div class="email-row" style="margin-bottom: 0;">
        <svg class="email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.04z"/>
        </svg>
        <span class="email-text">(264) 455-4740</span>
      </div>
    </div>
  </div>
</div>

<script>
  function copyEmail() {
    const email = 'compras3.sanfranciscohogar@gmail.com';
    navigator.clipboard.writeText(email).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '¡Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
